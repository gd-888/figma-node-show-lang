<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>多语言替换</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <style>
      body {
        font-family: sans-serif;
        padding: 12px;
      }
      h3 {
        margin-top: 0;
      }
      input[type="file"] {
        margin: 10px 0;
      }
      input[type="url"],
      input[type="text"] {
        width: 100%;
        box-sizing: border-box;
        padding: 6px;
        margin-top: 6px;
      }
      .url-row {
        display: flex;
        gap: 8px;
        margin-top: 8px;
        align-items: stretch;
      }
      .url-row input {
        flex: 1;
        margin-top: 0;
      }
      .url-row button {
        margin-top: 0;
        width: auto;
        min-width: 88px;
        flex-shrink: 0;
      }
      select,
      button {
        margin-top: 10px;
        width: 100%;
        padding: 6px;
      }
      #status {
        margin-top: 10px;
        color: #555;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <h3>多语言替换工具</h3>
    <input type="file" id="fileInput" accept=".csv,.xlsx" />
    <label
      for="sheetUrlInput"
      style="display: block; margin-top: 12px; font-size: 12px; color: #333"
      >或粘贴公开 Google 表格链接</label
    >
    <div class="url-row">
      <input
        type="url"
        id="sheetUrlInput"
        placeholder="请输入google表格链接,xxxx/sheetId和gid"
        autocomplete="off"
      />
      <button type="button" id="loadUrlBtn">从链接加载</button>
    </div>
    <label
      for="sheetSelect"
      style="display: block; margin-top: 8px; font-size: 12px; color: #333"
      >工作表</label
    >
    <select id="sheetSelect" disabled></select>
    <label
      for="langSelect"
      style="display: block; margin-top: 8px; font-size: 12px; color: #333"
      >语言列</label
    >
    <select id="langSelect" disabled></select>
    <label
      style="display: block; margin-top: 8px; font-size: 12px; color: #333"
    >
      <input type="checkbox" id="applyWholePageCheckbox" />
      刷新整个页面（默认仅刷新当前选中节点）
    </label>
    <button id="applyBtn" disabled>应用翻译</button>
    <button id="cancelBtn">取消</button>
    <div id="status">
      本地上传；或表格公开可读后粘贴链接（sheetId + gid，一次一个子表）
    </div>

    <script>
      let translationsMap = {};
      let selectedLang = "";
      let currentWorkbook = null;
      let publicSheetLoadPending = false;

      const sheetSelect = document.getElementById("sheetSelect");
      const langSelect = document.getElementById("langSelect");
      const applyBtn = document.getElementById("applyBtn");
      const statusEl = document.getElementById("status");
      const sheetUrlInput = document.getElementById("sheetUrlInput");
      const applyWholePageCheckbox = document.getElementById(
        "applyWholePageCheckbox",
      );

      function saveUiPrefsPatch(prefsPatch) {
        parent.postMessage(
          { pluginMessage: { type: "save-ui-prefs", prefs: prefsPatch } },
          "*",
        );
      }

      function fillSelectOptions(selectEl, values) {
        selectEl.innerHTML = "";
        values.forEach((v) => {
          const opt = document.createElement("option");
          opt.value = v;
          opt.textContent = v;
          selectEl.appendChild(opt);
        });
        selectEl.disabled = values.length === 0;
      }

      function fillLangSelect(langs) {
        fillSelectOptions(langSelect, langs);
        selectedLang = langs[0] || "";
      }

      /** 表头中标识列：列名须严格为 key 或 HEAD（区分大小写），优先 key */
      function resolveIdColumn(headerKeys) {
        const keyCol = headerKeys.find((k) => String(k) === "key");
        if (keyCol !== undefined) return keyCol;
        const headCol = headerKeys.find((k) => String(k) === "HEAD");
        if (headCol !== undefined) return headCol;
        return null;
      }

      function loadSheetByName(sheetName) {
        if (!currentWorkbook || !sheetName) return false;
        const sheet = currentWorkbook.Sheets[sheetName];
        if (!sheet) {
          statusEl.textContent = "❌ 找不到工作表: " + sheetName;
          translationsMap = {};
          fillLangSelect([]);
          applyBtn.disabled = true;
          return false;
        }

        const rows = XLSX.utils.sheet_to_json(sheet);
        if (rows.length === 0) {
          statusEl.textContent = "❌ 当前工作表为空: " + sheetName;
          translationsMap = {};
          fillLangSelect([]);
          applyBtn.disabled = true;
          return false;
        }

        const headerKeys = Object.keys(rows[0]);
        const idCol = resolveIdColumn(headerKeys);
        if (idCol === null) {
          statusEl.textContent =
            "❌ 工作表「" +
            sheetName +
            "」表头需包含列名 key 或 HEAD（区分大小写）";
          translationsMap = {};
          fillLangSelect([]);
          applyBtn.disabled = true;
          return false;
        }

        const langs = headerKeys.filter((k) => k !== idCol);
        if (langs.length === 0) {
          statusEl.textContent =
            "❌ 工作表「" + sheetName + "」在标识列外没有语言列";
          translationsMap = {};
          fillLangSelect([]);
          applyBtn.disabled = true;
          return false;
        }

        fillLangSelect(langs);
        translationsMap = {};
        rows.forEach((r) => {
          const idVal = r[idCol];
          if (idVal !== undefined && idVal !== null && String(idVal) !== "") {
            translationsMap[String(idVal)] = r;
          }
        });
        applyBtn.disabled = false;
        statusEl.textContent =
          "✅ 工作表「" + sheetName + "」，语言列: " + langs.join(", ");
        return true;
      }

      function applyWorkbookArrayBuffer(data, parseErrorPrefix) {
        try {
          currentWorkbook = XLSX.read(data, { type: "array" });
          const names = currentWorkbook.SheetNames || [];

          if (names.length === 0) {
            statusEl.textContent =
              (parseErrorPrefix || "") + "❌ 没有解析到工作表";
            fillSelectOptions(sheetSelect, []);
            fillLangSelect([]);
            applyBtn.disabled = true;
            return;
          }

          fillSelectOptions(sheetSelect, names);
          loadSheetByName(names[0]);
        } catch (err) {
          statusEl.textContent =
            (parseErrorPrefix || "") + "❌ 解析失败: " + err.message;
          currentWorkbook = null;
          fillSelectOptions(sheetSelect, []);
          fillLangSelect([]);
          applyBtn.disabled = true;
        }
      }

      /**
       * 从 Google 表格浏览器链接解析表格 ID 与可选 gid（子表）。
       * 不支持 Google 文档（Docs）正文链接。
       */
      function parseGoogleSheetsLink(raw) {
        const s = String(raw || "").trim();
        if (!s) return { error: "请先粘贴链接" };
        let url;
        try {
          url = new URL(s);
        } catch {
          return { error: "链接格式无效" };
        }
        if (url.hostname !== "docs.google.com") {
          return { error: "请使用 docs.google.com 下的 Google 表格链接" };
        }
        const docPath = url.pathname.match(/\/document\/d\/([a-zA-Z0-9-_]+)/);
        if (docPath) {
          return {
            error:
              "当前为 Google 文档链接，请改用 Google 表格（Sheets），或导出后本地上传",
          };
        }
        const sheetPath = url.pathname.match(
          /\/spreadsheets\/d\/([a-zA-Z0-9-_]+)/,
        );
        if (!sheetPath) {
          return { error: "未识别为 Google 表格链接" };
        }
        let gid = url.searchParams.get("gid") || undefined;
        if (!gid && url.hash) {
          const hm = url.hash.match(/gid=(\d+)/);
          if (hm) gid = hm[1];
        }
        return { spreadsheetId: sheetPath[1], gid };
      }

      function applyPublicCsvText(csv) {
        try {
          currentWorkbook = XLSX.read(csv, { type: "string", raw: false });
          const names = currentWorkbook.SheetNames || [];
          if (names.length === 0) {
            statusEl.textContent = "❌ CSV 未解析出工作表";
            currentWorkbook = null;
            fillSelectOptions(sheetSelect, []);
            fillLangSelect([]);
            applyBtn.disabled = true;
            return;
          }
          fillSelectOptions(sheetSelect, names);
          const ok = loadSheetByName(names[0]);
          if (ok) {
            statusEl.textContent =
              statusEl.textContent +
              " · 当前为链接中的子表（gid）；换子表请打开对应标签页再复制链接";
          }
        } catch (err) {
          statusEl.textContent = "❌ CSV 解析失败: " + err.message;
          currentWorkbook = null;
          fillSelectOptions(sheetSelect, []);
          fillLangSelect([]);
          applyBtn.disabled = true;
        }
      }

      function loadFromGoogleSheetsUrl() {
        const urlText = sheetUrlInput.value;
        saveUiPrefsPatch({ sheetUrl: urlText });
        const parsed = parseGoogleSheetsLink(urlText);
        if (parsed.error) {
          statusEl.textContent = "❌ " + parsed.error;
          return;
        }
        if (publicSheetLoadPending) return;
        publicSheetLoadPending = true;
        statusEl.textContent = "正在获取 CSV…";
        parent.postMessage(
          {
            pluginMessage: {
              type: "fetch-public-sheet-csv",
              spreadsheetId: parsed.spreadsheetId,
              gid: parsed.gid,
            },
          },
          "*",
        );
      }

      sheetSelect.addEventListener("change", () => {
        loadSheetByName(sheetSelect.value);
      });

      langSelect.addEventListener("change", (ev) => {
        selectedLang = ev.target.value;
      });

      document.getElementById("loadUrlBtn").addEventListener("click", () => {
        loadFromGoogleSheetsUrl();
      });

      document
        .getElementById("sheetUrlInput")
        .addEventListener("keydown", (e) => {
          if (e.key === "Enter") {
            e.preventDefault();
            loadFromGoogleSheetsUrl();
          }
        });

      sheetUrlInput.addEventListener("change", () => {
        saveUiPrefsPatch({ sheetUrl: sheetUrlInput.value });
      });

      applyWholePageCheckbox.addEventListener("change", () => {
        saveUiPrefsPatch({
          applyWholePage: applyWholePageCheckbox.checked,
        });
      });

      document
        .getElementById("fileInput")
        .addEventListener("change", async (e) => {
          const file = e.target.files[0];
          if (!file) return;

          try {
            const data = await file.arrayBuffer();
            applyWorkbookArrayBuffer(data, "");
          } catch (err) {
            statusEl.textContent = "❌ 读取文件失败: " + err.message;
            currentWorkbook = null;
            fillSelectOptions(sheetSelect, []);
            fillLangSelect([]);
            applyBtn.disabled = true;
          }
        });

      document.getElementById("applyBtn").onclick = () => {
        const translations = {};
        for (let key in translationsMap) {
          translations[key] = translationsMap[key][selectedLang];
        }
        parent.postMessage(
          {
            pluginMessage: {
              type: "apply-translations",
              translations,
              applyWholePage: applyWholePageCheckbox.checked,
            },
          },
          "*",
        );
      };

      document.getElementById("cancelBtn").onclick = () => {
        parent.postMessage({ pluginMessage: { type: "cancel" } }, "*");
      };

      window.addEventListener("message", (event) => {
        const pm = event.data && event.data.pluginMessage;
        if (!pm || typeof pm !== "object") return;
        if (pm.type === "ui-prefs") {
          const prefs = pm.prefs || {};
          if (typeof prefs.sheetUrl === "string") {
            sheetUrlInput.value = prefs.sheetUrl;
          }
          applyWholePageCheckbox.checked = prefs.applyWholePage === true;
        } else if (pm.type === "public-sheet-csv-ok") {
          publicSheetLoadPending = false;
          applyPublicCsvText(pm.csv);
        } else if (pm.type === "public-sheet-csv-error") {
          publicSheetLoadPending = false;
          let t = "❌ " + (pm.message || "下载失败");
          if (pm.status) t += "（HTTP " + pm.status + "）";
          t += "。请确认表格已设为「知道链接的任何人可查看」，或改用本地上传。";
          statusEl.textContent = t;
        } else if (pm.type === "apply-aborted-no-selection") {
          statusEl.textContent =
            "❌ 未选中任何节点，已中断执行。请先选中节点或勾选“刷新整个页面”。";
        }
      });

      parent.postMessage({ pluginMessage: { type: "get-ui-prefs" } }, "*");
    </script>
  </body>
</html>
